services:
  - type: web
    name: travel-agent-orchestrator
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:all
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DAILY_PLAN_LIMIT
        value: "3"
